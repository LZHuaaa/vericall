name: vericall_mobile
description: VeriCall Malaysia - AI-Powered Voice Scam Detection

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  lottie: ^3.0.0
  
  # Firebase
  firebase_core: ^2.24.0
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  firebase_messaging: ^14.7.0
  
  # Audio  
  record: ^6.0.0
  audioplayers: ^6.0.0
  permission_handler: ^11.1.0
  
  # Network
  http: ^1.1.0
  dio: ^5.4.0
  web_socket_channel: ^3.0.1
  
  # WebRTC
  flutter_webrtc: ^0.12.4
  
  # State Management
  provider: ^6.1.1
  
  # Local Storage
  shared_preferences: ^2.2.2
  
  # Voice (TTS/STT for Scam Vaccine)
  flutter_tts: ^4.2.0
  speech_to_text: ^7.0.0

  # Sharing
  share_plus: ^10.1.4

  # Utilities
  intl: ^0.19.0
  uuid: ^4.2.2
  mobile_scanner: ^5.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  # assets:
  #   - assets/images/
  #   - assets/animations/
  
  # fonts: Handled by google_fonts package
